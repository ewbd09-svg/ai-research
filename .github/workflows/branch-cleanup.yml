name: Branch Cleanup
on:
  pull_request:
    types: [closed]
permissions:
  contents: write
jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Skip admin/main branches
            if (headRef === "master" || headRef === "main" || headRef === "develop") {
              console.log("Skipping protected branch: " + headRef);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: "heads/" + headRef
              });
              console.log("Deleted branch: " + headRef);
            } catch (e) {
              // Branch might already be deleted or protected
              if (e.status === 422) {
                console.log("Branch already deleted: " + headRef);
              } else {
                console.log("Could not delete " + headRef + ": " + e.message);
              }
            }
